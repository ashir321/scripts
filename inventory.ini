# ---------------------------------------------------------------------------
# Airgap settings (used by airgap-prep.sh / airgap-bootstrap.sh / airgap-longhorn.sh)
# ---------------------------------------------------------------------------
# Path to the artifact bundle on the machine running the bootstrap scripts.
# Created by airgap-prep.sh; must be transferred to the airgapped environment.
bundle_dir=./bundle

# Optional: address of a local container registry (e.g. "registry.local:5000"
# or "1.10.2.72:5000").  When set:
#   - containerd is configured to mirror registry.k8s.io / docker.io here
#   - kubeadm init uses --image-repository=<local_registry>
#   - Calico/Longhorn manifests are rewritten to reference this registry
# When empty, container images are loaded directly from bundle tarballs into
# each node's containerd store (simpler; no registry server required).
local_registry=

# Optional: override the containerd sandbox (pause) image.
# Leave empty to auto-detect from the kubeadm image list.
pause_image=

